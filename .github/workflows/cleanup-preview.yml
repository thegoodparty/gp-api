name: Cleanup Preview

permissions:
  contents: read
  id-token: write
  pull-requests: read

on:
  workflow_dispatch:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'

jobs:
  discover-stale-stacks:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.find-stale.outputs.stacks }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: '^3'

      - run: npm ci

      - name: Find stale PR stacks
        id: find-stale
        working-directory: deploy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pulumi login s3://goodparty-iac-state
          npx tsx ../scripts/find-stale-preview-stacks.ts /tmp/stale-stacks.json
          echo "stacks=$(cat /tmp/stale-stacks.json)" >> $GITHUB_OUTPUT

  destroy:
    needs: discover-stale-stacks
    if: needs.discover-stale-stacks.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        stack: ${{ fromJson(needs.discover-stale-stacks.outputs.stacks) }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: '^3'

      - run: npm ci

      - name: Delete Clerk users
        continue-on-error: true
        run: |
          STACK_NAME="${{ matrix.stack }}"
          PR_NUM="${STACK_NAME#gp-api-pr-}"
          CLUSTER="gp-pr-${PR_NUM}-fargateCluster"
          TASK_FAMILY="gp-pr-${PR_NUM}-fargateCluster-gp-api-pr-${PR_NUM}"

          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix "$TASK_FAMILY" \
            --sort DESC \
            --query 'taskDefinitionArns[0]' \
            --output text 2>/dev/null || echo "None")

          if [ "$TASK_DEF" = "None" ] || [ -z "$TASK_DEF" ]; then
            echo "No task definition found for $TASK_FAMILY — skipping Clerk cleanup"
            exit 0
          fi

          CONTAINER_NAME="gp-api-pr-${PR_NUM}"
          OVERRIDES=$(printf '{"containerOverrides":[{"name":"%s","command":["npm","run","migrate:destroy"]}]}' "$CONTAINER_NAME")

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-07984b965dabfdedc,subnet-01c540e6428cdd8db],securityGroups=[sg-01de8d67b0f0ec787],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text 2>/dev/null || echo "None")

          if [ "$TASK_ARN" = "None" ] || [ -z "$TASK_ARN" ]; then
            echo "Failed to start ECS task — skipping Clerk cleanup"
            exit 0
          fi

          echo "Waiting for Clerk cleanup task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" || true

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text 2>/dev/null || echo "unknown")
          echo "Clerk cleanup task exit code: $EXIT_CODE"

      - name: Drain ECS tasks and empty preview buckets
        run: |
          STACK_NAME="${{ matrix.stack }}"
          PR_NUM="${STACK_NAME#gp-api-pr-}"
          CLUSTER="gp-pr-${PR_NUM}-fargateCluster"

          # Scale services to 0 and stop any running tasks so pulumi destroy can
          # delete the cluster without hitting ClusterContainsTasksException.
          CLUSTER_STATUS=$(aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$CLUSTER_STATUS" = "ACTIVE" ]; then
            SERVICE_ARNS=$(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text 2>/dev/null || true)
            for SERVICE in $SERVICE_ARNS; do
              echo "Scaling $SERVICE to 0"
              aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --desired-count 0 --no-cli-pager >/dev/null || true
            done

            TASK_ARNS=$(aws ecs list-tasks --cluster "$CLUSTER" --desired-status RUNNING --query 'taskArns[]' --output text 2>/dev/null || true)
            if [ -n "$TASK_ARNS" ]; then
              echo "Stopping active tasks in $CLUSTER: $TASK_ARNS"
              for TASK in $TASK_ARNS; do
                aws ecs stop-task --cluster "$CLUSTER" --task "$TASK" --reason "cleanup-preview" --no-cli-pager >/dev/null || true
              done
              echo "Waiting for tasks to stop..."
              aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks $TASK_ARNS || true
            fi
          else
            echo "Cluster $CLUSTER status=$CLUSTER_STATUS — skipping task drain"
          fi

          # Preview-scoped buckets have forceDestroy=false in Pulumi (intentional for
          # prod), so empty them here to avoid BucketNotEmpty on destroy.
          for BUCKET in "tevyn-poll-csvs-pr-${PR_NUM}" "zip-to-area-code-mappings-pr-${PR_NUM}"; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "Emptying $BUCKET"
              aws s3 rm "s3://$BUCKET" --recursive --only-show-errors || true
            else
              echo "Bucket $BUCKET not found — skipping"
            fi
          done

      - name: Destroy Stack
        working-directory: ./deploy
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          # Login to S3 Backend
          pulumi login s3://goodparty-iac-state

          STACK_NAME="${{ matrix.stack }}"
          echo "Destroying stack: $STACK_NAME"

          if pulumi stack select "$STACK_NAME"; then
            echo "Stack found. Destroying..."
            pulumi destroy --yes --skip-preview
            # This log group is created by ECS automatically and needs to be deleted manually
            aws logs delete-log-group --log-group-name "/aws/ecs/containerinsights/gp-pr-${STACK_NAME#gp-api-pr-}-fargateCluster/performance" || true
            pulumi stack rm --yes
            echo "Stack $STACK_NAME destroyed successfully"
          else
            echo "Stack $STACK_NAME not found. Skipping."
          fi
